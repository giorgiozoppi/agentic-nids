name: Build, push and maybe deploy

# Builds changed service images on every push to main and on tags.
# Deployment to Linode LKE is gated on a git tag ending with "+k8s":
#
#   git tag v1.2.3+k8s && git push origin v1.2.3+k8s
#
# Required secrets (Settings → Secrets → Actions):
#   KUBE_CONFIG              — raw LKE kubeconfig YAML (NOT base64-encoded)
#                              linode-cli lke kubeconfig-view <cluster-id> --text --no-headers
#   GRAFANA_ADMIN_PASSWORD   — Grafana admin password (optional, for observability stack)
#
# Required variables (Settings → Variables → Actions):
#   (none — uses github.repository_owner as the image namespace)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write        # push to GHCR
  security-events: write # upload Trivy SARIF

env:
  REGISTRY: ghcr.io

# ---------------------------------------------------------------------------
jobs:

  # ── detect which services changed ─────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent:        ${{ steps.filter.outputs.agent }}
      classifier:   ${{ steps.filter.outputs.classifier }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      search:       ${{ steps.filter.outputs.search }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent:
              - 'services/agent/**'
            classifier:
              - 'services/classifier/**'
              - 'proto/**'
            orchestrator:
              - 'services/orchestrator/**'
              - 'proto/**'
            search:
              - 'services/search/**'

  # ── build & push to GHCR ──────────────────────────────────────────────────
  build-push:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    agent
            changed:    ${{ needs.changes.outputs.agent }}
            dockerfile: services/agent/Dockerfile
            image:      nids-agent
          - service:    classifier
            changed:    ${{ needs.changes.outputs.classifier }}
            dockerfile: services/classifier/Dockerfile
            image:      nids-classifier
          - service:    orchestrator
            changed:    ${{ needs.changes.outputs.orchestrator }}
            dockerfile: services/orchestrator/Dockerfile
            image:      nids-orchestrator
          - service:    search
            changed:    ${{ needs.changes.outputs.search }}
            dockerfile: services/search/Dockerfile
            image:      nids-search

    steps:
      - uses: actions/checkout@v4

      # ── Check if this commit was already built and pushed ─────────────────
      - name: Check for previous successful build of this commit
        id: prev-build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Look for a previous successful run of this workflow for the same SHA.
          WF_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}" \
            --jq '[.workflow_runs[]
                   | select(.name == "'"${{ github.workflow }}"'")
                   | select(.conclusion == "success")]
                   | sort_by(.id) | .[-1].id // empty' 2>/dev/null || echo "")
          echo "wf_run_id=$WF_ID" >> "$GITHUB_OUTPUT"

      - name: Download previous build digest (if any)
        uses: actions/download-artifact@v4
        if: steps.prev-build.outputs.wf_run_id != ''
        continue-on-error: true
        with:
          name:         docker-build-info-${{ matrix.service }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id:       ${{ steps.prev-build.outputs.wf_run_id }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Decide whether a new build is needed ─────────────────────────────
      - name: Check if build can be skipped
        id: skip-check
        run: |
          SHOULD=true
          DIGEST=$(cat docker_image_digest.txt 2>/dev/null || true)
          if [[ -n "$DIGEST" && "${{ matrix.changed }}" != "true" ]]; then
            # Verify the image actually exists in GHCR before trusting the cached digest.
            if docker manifest inspect \
                 "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${DIGEST}" \
                 > /dev/null 2>&1; then
              SHOULD=false
              echo "Image already in registry — skipping build."
              # Carry the digest forward so the deploy job can use it.
              cp docker_image_digest.txt docker_image_digest_carry.txt
            fi
          fi
          echo "should_build=$SHOULD" >> "$GITHUB_OUTPUT"

      # ── Build & push ──────────────────────────────────────────────────────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        if: steps.skip-check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: |
          steps.skip-check.outputs.should_build == 'true' &&
          github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file:    ${{ matrix.dockerfile }}
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Enable xgboost feature for the classifier image (ONNX + ORT).
          build-args: |
            BUILD_FEATURES=${{ matrix.service == 'classifier' && 'xgboost' || '' }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Save the image digest so the deploy and scan jobs can use it.
      - name: Save image digest
        if: steps.skip-check.outputs.should_build == 'true'
        run: echo "${{ steps.build.outputs.digest }}" > docker_image_digest.txt

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name:              docker-build-info-${{ matrix.service }}
          path:              docker_image_digest.txt
          if-no-files-found: ignore

  # ── Deploy to Linode LKE ───────────────────────────────────────────────────
  # Triggered ONLY when the git tag ends with "+k8s", e.g.:
  #   git tag v1.2.3+k8s && git push origin v1.2.3+k8s
  deploy:
    needs: [changes, build-push]
    runs-on: ubuntu-latest
    environment: production
    if: ${{ endsWith(github.ref_name, '+k8s') }}

    steps:
      - uses: actions/checkout@v4

      # azure/k8s-set-context writes the kubeconfig to ~/.kube/config.
      # Secret KUBE_CONFIG must contain the raw LKE kubeconfig YAML —
      # NOT base64-encoded. Copy it straight from:
      #   linode-cli lke kubeconfig-view <cluster-id> --text --no-headers
      - name: Configure kubeconfig (LKE)
        uses: azure/k8s-set-context@v3
        with:
          method:     kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # Download the per-service digest artifacts produced by the build-push job.
      - name: Download agent digest
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docker-build-info-agent
          path: digests/agent

      - name: Download classifier digest
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docker-build-info-classifier
          path: digests/classifier

      - name: Download orchestrator digest
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docker-build-info-orchestrator
          path: digests/orchestrator

      - name: Download search digest
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docker-build-info-search
          path: digests/search

      # Pin each service manifest to its image digest.
      # Digests are immutable — no "latest was overwritten" surprises.
      - name: Update image digests in manifests
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER:    ${{ github.repository_owner }}
        run: |
          pin() {
            local MANIFEST="$1" IMAGE="$2" DIGEST_FILE="$3"
            local DIGEST
            DIGEST=$(cat "$DIGEST_FILE" 2>/dev/null || true)
            [ -z "$DIGEST" ] && return
            sed -i \
              "s|image: ${REGISTRY}/[^/]*/\(${IMAGE}\)[:@].*|image: ${REGISTRY}/${OWNER}/\1@${DIGEST}|g" \
              "$MANIFEST"
          }
          pin infra/k8s/nids-collector-deployment.yaml nids-agent       digests/agent/docker_image_digest.txt
          pin infra/k8s/classifier-deployment.yaml     nids-classifier   digests/classifier/docker_image_digest.txt
          pin infra/k8s/orchestrator-cronjob.yaml      nids-orchestrator digests/orchestrator/docker_image_digest.txt
          pin infra/k8s/search-deployment.yaml         nids-search       digests/search/docker_image_digest.txt

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy observability stack
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts && helm repo update
          helm upgrade --install nids-observability infra/helm/observability \
            --namespace observability \
            --create-namespace \
            --atomic --wait --timeout 5m \
            --set grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}"

      - name: Apply NIDS manifests
        run: kubectl apply -k infra/k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status daemonset/nids-collector -n nids --timeout=120s
          kubectl rollout status deployment/classifier    -n nids --timeout=120s
          kubectl rollout status deployment/search        -n nids --timeout=120s

  # ── Trivy vulnerability scan ───────────────────────────────────────────────
  security-scan:
    needs: build-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: agent
            image:   nids-agent
          - service: classifier
            image:   nids-classifier
          - service: orchestrator
            image:   nids-orchestrator
          - service: search
            image:   nids-search

    steps:
      - uses: actions/checkout@v4

      - name: Download digest for ${{ matrix.service }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docker-build-info-${{ matrix.service }}
          path: digest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        env:
          IMAGE_REF: >-
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${{
              hashFiles(format('digest/docker_image_digest.txt')) }}
        with:
          image-ref: >-
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${{
              hashFiles(format('digest/docker_image_digest.txt')) }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file:     trivy-${{ matrix.service }}.sarif
          category:       trivy-${{ matrix.service }}

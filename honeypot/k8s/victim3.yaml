---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victim3
  labels:
    app: victim3
    app.kubernetes.io/part-of: honeypot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victim3
  template:
    metadata:
      labels:
        app: victim3
        app.kubernetes.io/part-of: honeypot
    spec:
      containers:
        - name: victim3
          image: honeypot-victim3:latest
          imagePullPolicy: Never
          stdin: true
          tty: true
          ports:
            - name: ssh
              containerPort: 22
              hostPort: 2204
            - name: http
              containerPort: 80
              hostPort: 8083
            - name: redis
              containerPort: 6379
              hostPort: 6380
          volumeMounts:
            - name: redis-logs
              mountPath: /var/log/redis-honeypot
      volumes:
        - name: redis-logs
          persistentVolumeClaim:
            claimName: redis-logs
---
apiVersion: v1
kind: Service
metadata:
  name: victim3
spec:
  selector:
    app: victim3
  ports:
    - name: ssh
      port: 22
      targetPort: 22
    - name: http
      port: 80
      targetPort: 80
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victim1
  labels:
    app: victim1
    app.kubernetes.io/part-of: honeypot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victim1
  template:
    metadata:
      labels:
        app: victim1
        app.kubernetes.io/part-of: honeypot
    spec:
      containers:
        - name: victim1
          image: honeypot-victim1:latest
          imagePullPolicy: Never
          stdin: true
          tty: true
          ports:
            - name: ssh
              containerPort: 22
              hostPort: 2202
            - name: http
              containerPort: 80
              hostPort: 8081
            - name: ftp
              containerPort: 21
              hostPort: 2121
            - name: smtp
              containerPort: 25
              hostPort: 2525
---
apiVersion: v1
kind: Service
metadata:
  name: victim1
spec:
  selector:
    app: victim1
  ports:
    - name: ssh
      port: 22
      targetPort: 22
    - name: http
      port: 80
      targetPort: 80
    - name: ftp
      port: 21
      targetPort: 21
    - name: smtp
      port: 25
      targetPort: 25
  type: ClusterIP

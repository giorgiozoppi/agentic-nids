---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: honeypot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-honeypot
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, watch, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-honeypot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-honeypot
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: honeypot

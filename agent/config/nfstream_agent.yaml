# NFStream Collector Agent — NATS Producer Configuration

# ---------------------------------------------------------------------------
# Collection
# ---------------------------------------------------------------------------
collection_interval: 60     # seconds between timed batch flushes
idle_timeout:        120    # flow idle expiry (seconds)
active_timeout:      1800   # maximum flow lifetime (seconds)
batch_size:          100    # flows per NATS message

# ---------------------------------------------------------------------------
# Capture source — set exactly one of capture_interface or pcap_file
# ---------------------------------------------------------------------------
capture_interface: null     # e.g. eth0, ens3, en0
pcap_file:         null     # e.g. /data/traffic.pcap

bpf_filter:          null   # optional BPF filter, e.g. "tcp port 443"
promiscuous_mode:    true
snapshot_length:     1536

# ---------------------------------------------------------------------------
# NFStream / nDPI settings
# ---------------------------------------------------------------------------
decode_tunnels:       true
n_dissections:        20    # 0 = disabled, 20 = full nDPI analysis
statistical_analysis: true  # packet size / IAT statistics
splt_analysis:        0     # early-flow features (0 = off)
system_visibility_mode: 0   # 1 = capture process info (requires root)
max_nflows:           0     # 0 = unlimited
performance_report:   0

# ---------------------------------------------------------------------------
# Payload extraction
# ---------------------------------------------------------------------------
extract_payload:    true
max_payload_bytes:  200     # bytes captured per direction

# ---------------------------------------------------------------------------
# NATS output
# ---------------------------------------------------------------------------
nats_enabled: true
nats_url:     "nats://localhost:4222"
nats_subject: "nids.flows"

# ---------------------------------------------------------------------------
# Optional debug dump (leave null in production)
# ---------------------------------------------------------------------------
flows_output_file: null

# ---------------------------------------------------------------------------
# Stats
# ---------------------------------------------------------------------------
stats_interval: 60

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    environment:
      - MODEL_NAME=gemma
      - MODEL_PATH=/models/gemma
    volumes:
      - ./models/gemma:/models/gemma  # Place Gemma model weights here
    ports:
      - "8000:8000"  # vLLM OpenAI-compatible API
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/gemma
      --served-model-name gemma
      --host 0.0.0.0
      --port 8000

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native client
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  clickhouse_data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonatype-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonatype-nexus
  template:
    metadata:
      labels:
        app: sonatype-nexus
    spec:
      containers:
      - name: nexus
        image: sonatype/nexus3:latest
        ports:
        - containerPort: 8081
        volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
      volumes:
      - name: nexus-data
        hostPath:
          path: /tmp/nexus-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: sonatype-nexus
spec:
  type: NodePort
  selector:
    app: sonatype-nexus
  ports:
    - name: nexus
      port: 8081
      targetPort: 8081
      nodePort: 38081

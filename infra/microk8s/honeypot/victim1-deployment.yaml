apiVersion: apps/v1
kind: Deployment
metadata:
  name: honeypot-victim1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honeypot-victim1
  template:
    metadata:
      labels:
        app: honeypot-victim1
    spec:
      containers:
      - name: victim1
        image: honeypot-victim1:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 22
        - containerPort: 80
        - containerPort: 21
        - containerPort: 25
        volumeMounts:
        - name: shared
          mountPath: /shared
        stdin: true
        tty: true
      volumes:
      - name: shared
        hostPath:
          path: /tmp/honeypot-shared
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: honeypot-victim1
spec:
  type: NodePort
  selector:
    app: honeypot-victim1
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 32202
    - name: http
      port: 80
      targetPort: 80
      nodePort: 38081
    - name: ftp
      port: 21
      targetPort: 21
      nodePort: 32121
    - name: smtp
      port: 25
      targetPort: 25
      nodePort: 32525

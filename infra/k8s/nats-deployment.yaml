---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nats
  namespace: nids

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: nids
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
      annotations:
        # ── Vault agent injection ───────────────────────────────────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "nids"

        # Render NATS credentials into /vault/secrets/nats.conf
        # The file is picked up by the nats-server via -config flag below.
        vault.hashicorp.com/agent-inject-secret-nats.conf: "kv/data/nids/nats"
        vault.hashicorp.com/agent-inject-template-nats.conf: |
          {{- with secret "kv/data/nids/nats" -}}
          # Generated by Vault agent — do not edit manually.
          authorization {
            user:     "{{ .Data.data.username }}"
            password: "{{ .Data.data.password }}"
          }
          {{- end }}

        # Keep the secret file up-to-date when it rotates in Vault.
        vault.hashicorp.com/agent-inject-command-nats.conf: "kill -HUP $(pgrep nats-server)"
    spec:
      serviceAccountName: nats
      containers:
        - name: nats
          image: nats:2-alpine
          args:
            - "--port=4222"
            - "--http_port=8222"
            - "--config=/vault/secrets/nats.conf"
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: nids
  labels:
    app: nats
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: classifier
  namespace: nids

---
# Non-secret classifier configuration.
# NIDS_CLASSIFIER_LABELS  — labels the classifier recognises (must match training data order)
# NIDS_CLASSIFIER_TYPE    — "dummy" (random labels, no model) or "xgboost" (ONNX model)
# Secrets (ClickHouse password, model path) come from Vault.
apiVersion: v1
kind: ConfigMap
metadata:
  name: classifier-config
  namespace: nids
data:
  # ── Classifier behaviour ─────────────────────────────────────────────────
  # Labels must match the training data class order exactly.
  NIDS_CLASSIFIER_LABELS: "BENIGN,DoS,DDoS,PortScan,BruteForce,WebAttack,Botnet,Malware"

  # Backend: "dummy" (random labels, no model) or "xgboost" (ONNX model).
  # Switch to "xgboost" and set NIDS_MODEL_PATH once a trained model is ready.
  NIDS_CLASSIFIER_TYPE:   "dummy"

  # OnnxRuntime execution provider: "cpu" (default) or "cuda".
  # "cuda" requires a GPU node and CUDA libraries present in the image.
  NIDS_ORT_EP:            "cpu"

  # Memory reserved per request by k8s (see resources.requests below).
  # Increase to 4Gi for xgboost/ONNX inference under production load.
  # This value is informational — the actual limit is in the Deployment spec.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: nids
  labels:
    app: classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classifier
  template:
    metadata:
      labels:
        app: classifier
      annotations:
        # ── Vault agent injection ─────────────────────────────────────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "nids-classifier"

        # Render ClickHouse credentials as a sourceable env file.
        vault.hashicorp.com/agent-inject-secret-ch.env: "kv/data/nids/classifier"
        vault.hashicorp.com/agent-inject-template-ch.env: |
          {{- with secret "kv/data/nids/classifier" -}}
          export NIDS_CH_URL="{{ .Data.data.ch_url }}"
          export NIDS_CH_DB="{{ .Data.data.ch_db }}"
          export NIDS_CH_USER="{{ .Data.data.ch_user }}"
          export NIDS_CH_PASSWORD="{{ .Data.data.ch_password }}"
          {{- end }}

        # Re-exec when secrets rotate (SIGHUP → process reload).
        vault.hashicorp.com/agent-inject-command-ch.env: "kill -HUP 1"
    spec:
      serviceAccountName: classifier
      containers:
        - name: classifier
          image: ghcr.io/your-org/nids-classifier:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              # Source Vault-injected ClickHouse credentials.
              [ -f /vault/secrets/ch.env ] && . /vault/secrets/ch.env

              # Select classifier implementation based on ConfigMap value.
              if [ "${NIDS_CLASSIFIER_TYPE:-dummy}" = "xgboost" ]; then
                exec /classifier \
                  --addr 0.0.0.0:50051 \
                  --labels "${NIDS_CLASSIFIER_LABELS}" \
                  --classifier-type xgboost \
                  --model /models/classifier.onnx \
                  --ch-url   "${NIDS_CH_URL:-}" \
                  --ch-db    "${NIDS_CH_DB:-nids}" \
                  --ch-user  "${NIDS_CH_USER:-default}" \
                  --ch-password "${NIDS_CH_PASSWORD:-}"
              else
                exec /classifier \
                  --addr 0.0.0.0:50051 \
                  --labels "${NIDS_CLASSIFIER_LABELS}" \
                  --classifier-type dummy \
                  --ch-url   "${NIDS_CH_URL:-}" \
                  --ch-db    "${NIDS_CH_DB:-nids}" \
                  --ch-user  "${NIDS_CH_USER:-default}" \
                  --ch-password "${NIDS_CH_PASSWORD:-}"
              fi
          # ConfigMap provides non-secret config.
          envFrom:
            - configMapRef:
                name: classifier-config
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          # /models is only needed for xgboost; safe to mount even in dummy mode.
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"   # 1 Gi reserved per instance as required
            limits:
              cpu:    "2"
              memory: "4Gi"   # headroom for xgboost/ONNX inference
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: models
          # Use an emptyDir in dummy mode; replace with a PVC containing the
          # ONNX model for xgboost mode.
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: classifier
  namespace: nids
  labels:
    app: classifier
spec:
  type: ClusterIP
  selector:
    app: classifier
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP

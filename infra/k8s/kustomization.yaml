apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply in this order: namespace first, then Vault (server before injector
# because the injector's webhook must reach a live Vault), then workloads.
resources:
  - namespace.yaml
  - vault/vault-server.yaml
  - vault/vault-agent-injector.yaml
  - vault/vault-init-job.yaml
  - nats-deployment.yaml
  - clickhouse-statefulset.yaml
  - nids-collector-deployment.yaml
  - classifier-deployment.yaml
  - orchestrator-cronjob.yaml
